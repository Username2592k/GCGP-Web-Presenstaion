<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>세계 기후 발표</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:sans-serif;
}

.slide{
    width:100vw;
    height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    padding:40px;

    text-align:center;

    position:absolute;
    top:0;
    left:0;

    opacity:0;
    transition:0.4s;
}

.slide.active{
    opacity:1;
}

h1{
    margin-bottom:20px;
}

p{
    max-width:800px;
    font-size:1.2rem;
}

.slide:nth-child(1){
    background:#f5f5f5;
}

.slide:nth-child(2){
    background:#d7f0ff;
}

.slide:nth-child(3){
    background:#ffe7c7;
}

#page{
    position:fixed;
    bottom:20px;
    right:20px;
    font-size:20px;
}
</style>
</head>

<body>

<section class="slide active">
    <h1>세계 시민과 지리</h1>
    <p>
        수도의 위치와 지리적 특성의 관계
    </p>
</section>

<section class="slide">
    <h1>기후 구분</h1>
    <p>
        Köppen 기후 구분 체계는 강수량과 기온을 기준으로 세계를 분류한다.
    </p>
</section>

<section class="slide">
    <h1>상호작용 지도</h1>

    <iframe
        src="https://www.openstreetmap.org"
        width="80%"
        height="70%"
        style="border:none;">
    </iframe>
</section>

<div id="page">1 / 3</div>

<script>
const slides = document.querySelectorAll(".slide");

let current = 0;

function showSlide(index){

    slides.forEach(slide=>{
        slide.classList.remove("active");
    });

    slides[index].classList.add("active");

    document.getElementById("page").textContent =
        `${index + 1} / ${slides.length}`;
}

document.addEventListener("keydown",(e)=>{

    if(e.key==="ArrowRight"){
        current = Math.min(
            current + 1,
            slides.length - 1
        );
    }

    if(e.key==="ArrowLeft"){
        current = Math.max(
            current - 1,
            0
        );
    }

    showSlide(current);
});
</script>

</body>
</html>
